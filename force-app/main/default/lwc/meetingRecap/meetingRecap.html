<template>
  <div class="app-container">
    <!-- Loading State -->
    <template lwc:if={isLoading}>
      <div class="status-card">
        <div class="status-card-content">
          <lightning-spinner
            alternative-text="Loading meeting recap..."
            size="medium"
          ></lightning-spinner>
          <p class="status-text">Loading meeting recap...</p>
        </div>
      </div>
    </template>

    <!-- Error State -->
    <template lwc:if={error}>
      <div class="status-card">
        <div class="status-card-content">
          <lightning-icon
            icon-name="utility:error"
            size="medium"
            variant="error"
          ></lightning-icon>
          <p class="status-text status-text--error">{error}</p>
        </div>
      </div>
    </template>

    <!-- Event Details Card -->
    <template lwc:if={eventData}>
      <div class="details-card">
        <div class="details-card-content">
          <h2
            class="event-subject"
            onclick={handleEventTitleClick}
            title="Click to open Event record"
          >
            {eventData.Subject}
          </h2>

          <div class="details-grid">
            <!-- Date/Time -->
            <div class="detail-item">
              <div class="detail-icon-container">
                <lightning-icon
                  icon-name="utility:date_time"
                  size="xx-small"
                  class="detail-icon"
                ></lightning-icon>
              </div>
              <div class="detail-content">
                <span class="detail-label">Date & Time</span>
                <span class="detail-value">{formattedStartDateTime}</span>
                <template lwc:if={formattedEndTime}>
                  <span class="detail-meta">Until {formattedEndTime}</span>
                </template>
                <template lwc:if={formattedDuration}>
                  <span class="detail-meta">({formattedDuration})</span>
                </template>
              </div>
            </div>

            <!-- Location -->
            <template lwc:if={eventData.Location}>
              <div class="detail-item">
                <div class="detail-icon-container">
                  <lightning-icon
                    icon-name="utility:location"
                    size="xx-small"
                    class="detail-icon"
                  ></lightning-icon>
                </div>
                <div class="detail-content">
                  <span class="detail-label">Location</span>
                  <span class="detail-value">{eventData.Location}</span>
                </div>
              </div>
            </template>

            <!-- Account -->
            <template lwc:if={accountId}>
              <div class="detail-item">
                <div class="detail-icon-container">
                  <lightning-icon
                    icon-name="utility:company"
                    size="xx-small"
                    class="detail-icon"
                  ></lightning-icon>
                </div>
                <div class="detail-content">
                  <span class="detail-label">Account</span>
                  <a
                    href="javascript:void(0)"
                    class="detail-link"
                    onclick={handleAccountClick}
                  >
                    {accountName}
                  </a>
                </div>
              </div>
            </template>

            <!-- Contact -->
            <template lwc:if={contactId}>
              <div class="detail-item">
                <div class="detail-icon-container">
                  <lightning-icon
                    icon-name="utility:user"
                    size="xx-small"
                    class="detail-icon"
                  ></lightning-icon>
                </div>
                <div class="detail-content">
                  <span class="detail-label">Contact</span>
                  <a
                    href="javascript:void(0)"
                    class="detail-link"
                    onclick={handleContactClick}
                  >
                    {contactName}
                  </a>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <template lwc:if={hasNoRecapData}>
        <div class="status-card">
          <div class="status-card-content">
            <div class="empty-icon-wrapper">
              <lightning-icon
                icon-name="standard:event"
                size="large"
                class="empty-icon"
              ></lightning-icon>
            </div>
            <h3 class="empty-title">No Meeting Recap Available</h3>
            <p class="empty-message">
              This meeting hasn't been recapped yet. Use the Meeting Command
              Center to generate an AI-powered recap after your meeting.
            </p>
          </div>
        </div>
      </template>

      <!-- Recap Content Cards -->
      <template lwc:if={hasRecapData}>
        <div class="recap-grid">
          <!-- Meeting Summary -->
          <template lwc:if={hasSummary}>
            <div class="recap-card">
              <div class="recap-card-header">
                <lightning-icon
                  icon-name="utility:summary"
                  size="small"
                  class="recap-header-icon recap-header-icon--summary"
                ></lightning-icon>
                <h3 class="recap-card-title">Meeting Summary</h3>
              </div>
              <div class="recap-card-body">
                <lightning-formatted-rich-text
                  value={eventData.AI_Meeting_Summary__c}
                  class="recap-text"
                ></lightning-formatted-rich-text>
              </div>
            </div>
          </template>

          <!-- Key Outcomes -->
          <template lwc:if={hasKeyOutcomes}>
            <div class="recap-card">
              <div class="recap-card-header">
                <lightning-icon
                  icon-name="utility:success"
                  size="small"
                  class="recap-header-icon recap-header-icon--outcomes"
                ></lightning-icon>
                <h3 class="recap-card-title">Key Outcomes</h3>
              </div>
              <div class="recap-card-body">
                <lightning-formatted-rich-text
                  value={formattedKeyOutcomes}
                  class="recap-text"
                ></lightning-formatted-rich-text>
              </div>
            </div>
          </template>

          <!-- Next Steps -->
          <template lwc:if={hasNextSteps}>
            <div class="recap-card">
              <div class="recap-card-header">
                <lightning-icon
                  icon-name="utility:forward"
                  size="small"
                  class="recap-header-icon recap-header-icon--nextsteps"
                ></lightning-icon>
                <h3 class="recap-card-title">Next Steps</h3>
              </div>
              <div class="recap-card-body">
                <lightning-formatted-rich-text
                  value={formattedNextSteps}
                  class="recap-text"
                ></lightning-formatted-rich-text>
              </div>
            </div>
          </template>
        </div>

        <!-- Recommended Actions -->
        <template lwc:if={showActionButtons}>
          <div class="actions-card">
            <div class="actions-card-header">
              <h3 class="actions-title">Recommended Actions</h3>
            </div>
            <div class="actions-grid">
              <!-- Dynamic action buttons -->
              <template for:each={actionableItems} for:item="action">
                <div key={action.id} class="action-tile">
                  <div class="action-tile-body">
                    <div class="action-btn-wrap">
                      <lightning-button
                        variant={action.variant}
                        icon-name={action.icon}
                        label={action.label}
                        title={action.text}
                        onclick={handleActionClick}
                        data-step-text={action.text}
                        data-action-type={action.type}
                        disabled={action.isLoading}
                        is-loading={action.isLoading}
                      ></lightning-button>
                    </div>
                    <p class="action-description" title={action.text}>
                      {action.text}
                    </p>
                  </div>
                </div>
              </template>

              <!-- Send to Slack -->
              <div class="action-tile">
                <div class="action-tile-body action-tile-body--centered">
                  <div class="action-btn-wrap">
                    <lightning-button
                      variant="brand"
                      icon-name="utility:share"
                      label="Send Recap to Slack"
                      onclick={handleSendToSlack}
                    ></lightning-button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </template>
    </template>
  </div>
</template>
